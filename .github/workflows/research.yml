name: Research & Publish

on:
  schedule:
    - cron: "0 */4 * * *"   # Every 4 hours
  workflow_dispatch:          # Allow manual runs

permissions:
  contents: write

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Configure git identity
        run: |
          git config user.name "pulse360-bot"
          git config user.email "pulse360-bot@users.noreply.github.com"

      - name: Run researcher agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          GNEWS_KEY: ${{ secrets.GNEWS_KEY }}
          MAX_ARTICLES_PER_RUN: "25"
        run: python scripts/researcher.py

      - name: Check for new articles
        id: check
        run: |
          COUNT=$(git log --oneline -1 --format="%s" | grep -c "chore(content)" || true)
          echo "new_articles=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Push new articles
        if: steps.check.outputs.new_articles == '1'
        run: |
          git pull --rebase origin main
          git push
        # Deploy workflow triggers automatically on push to main
